<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f0e8;
      --surface: #fdfaf4;
      --ink:     #1a1612;
      --muted:   #8a7f72;
      --accent:  #c84b2f;
      --done:    #b5ad9e;
      --border:  #ddd5c4;
      --shadow:  0 2px 16px rgba(26,22,18,.08);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 40px 36px 36px;
      height: fit-content;
    }

    /* ── Header ── */
    .header { margin-bottom: 32px; }

    .header h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 2.6rem;
      line-height: 1.1;
      letter-spacing: -.5px;
    }

    .header h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .meta {
      margin-top: 8px;
      font-size: .82rem;
      color: var(--muted);
      letter-spacing: .3px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .input-row input::placeholder { color: var(--done); }
    .input-row input:focus { border-color: var(--accent); }

    .btn-add {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.3rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      line-height: 1;
    }

    .btn-add:hover  { opacity: .88; }
    .btn-add:active { transform: scale(.95); }
    .btn-add:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── List ── */
    #list { list-style: none; }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 4px;
      border-bottom: 1px solid var(--border);
      animation: slide-in .22s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child { border-bottom: none; }

    /* checkbox */
    .item input[type="checkbox"] { display: none; }

    .check-box {
      width: 22px;
      height: 22px;
      border: 1.8px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
    }

    .item.done .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-box::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) scaleY(0);
      transform-origin: bottom;
      transition: transform .15s;
    }

    .item.done .check-box::after { transform: rotate(45deg) scaleY(1); }

    /* label */
    .item-label {
      flex: 1;
      font-size: .97rem;
      cursor: pointer;
      transition: color .2s;
      word-break: break-word;
    }

    .item.done .item-label {
      color: var(--done);
      text-decoration: line-through;
      text-decoration-color: var(--done);
    }

    /* delete button */
    .btn-del {
      background: none;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      color: var(--border);
      font-size: 1rem;
      border-radius: 6px;
      transition: color .15s, background .15s;
      line-height: 1;
    }

    .btn-del:hover { color: var(--accent); background: #fceae6; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 32px 0 8px;
      color: var(--done);
    }

    .empty .icon { font-size: 2rem; margin-bottom: 8px; }
    .empty p { font-size: .88rem; }

    /* ── Loading state ── */
    .loading {
      text-align: center;
      padding: 32px 0 8px;
      color: var(--muted);
      font-size: .88rem;
    }

    /* ── Error toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1612;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: .85rem;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8rem;
      color: var(--muted);
      min-height: 24px;
    }

    .btn-clear {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color .15s;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .btn-clear:hover { color: var(--accent); }
    .btn-clear:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>쇼핑<br><em>리스트</em></h1>
    <p class="meta" id="meta">불러오는 중...</p>
  </div>

  <div class="input-row">
    <input id="input" type="text" placeholder="항목을 입력하세요" maxlength="60" autocomplete="off">
    <button class="btn-add" id="btnAdd" title="추가">+</button>
  </div>

  <div class="divider" id="divider" style="display:none">목록</div>

  <ul id="list"></ul>

  <div class="footer">
    <span id="footerCount"></span>
    <button class="btn-clear" id="btnClear" disabled>완료 항목 삭제</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jaeexzsgkljeyvvhiohu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphZWV4enNna2xqZXl2dmhpb2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMDE1NTksImV4cCI6MjA5MjU3NzU1OX0.3WftxsAM3YbtGKntlGyjYr808vgsCZObaG42W-COik4';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  const input    = document.getElementById('input');
  const btnAdd   = document.getElementById('btnAdd');
  const list     = document.getElementById('list');
  const meta     = document.getElementById('meta');
  const divider  = document.getElementById('divider');
  const footer   = document.getElementById('footerCount');
  const btnClear = document.getElementById('btnClear');
  const toast    = document.getElementById('toast');

  let items = [];
  let toastTimer = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function render() {
    list.innerHTML = '';

    if (items.length === 0) {
      list.innerHTML = `
        <li class="empty">
          <div class="icon">🛒</div>
          <p>아직 항목이 없어요.<br>위에서 추가해보세요!</p>
        </li>`;
      divider.style.display = 'none';
    } else {
      divider.style.display = 'flex';
      items.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');

        li.innerHTML = `
          <input type="checkbox" id="chk${item.id}" ${item.done ? 'checked' : ''}>
          <label class="check-box" for="chk${item.id}"></label>
          <label class="item-label" for="chk${item.id}">${escHtml(item.text)}</label>
          <button class="btn-del" title="삭제">✕</button>`;

        li.querySelector('input').addEventListener('change', () => toggle(item.id, item.done));
        li.querySelector('.btn-del').addEventListener('click', () => remove(item.id));

        list.appendChild(li);
      });
    }

    const total = items.length;
    const done  = items.filter(x => x.done).length;

    meta.textContent = total === 0
      ? '항목이 없습니다'
      : `총 ${total}개 · 완료 ${done}개`;

    footer.textContent = total > 0 ? `${total - done}개 남음` : '';
    btnClear.disabled  = done === 0;
  }

  async function loadItems() {
    list.innerHTML = '<li class="loading">불러오는 중...</li>';
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error(error);
      showToast('불러오기 실패: ' + error.message);
      list.innerHTML = '<li class="empty"><p>데이터를 불러올 수 없습니다.</p></li>';
      return;
    }
    items = data;
    render();
  }

  async function add() {
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    btnAdd.disabled = true;
    try {
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();
      if (error) throw error;
      items.unshift(data);
      input.value = '';
      render();
      input.focus();
    } catch (err) {
      console.error(err);
      showToast('저장 실패: ' + err.message);
    } finally {
      btnAdd.disabled = false;
    }
  }

  async function toggle(id, currentDone) {
    const { error } = await db
      .from('shopping_items')
      .update({ done: !currentDone })
      .eq('id', id);
    if (error) {
      console.error(error);
      showToast('업데이트 실패: ' + error.message);
      render();
      return;
    }
    const item = items.find(x => x.id === id);
    if (item) item.done = !currentDone;
    render();
  }

  async function remove(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (error) {
      console.error(error);
      showToast('삭제 실패: ' + error.message);
      return;
    }
    items = items.filter(x => x.id !== id);
    render();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  btnAdd.addEventListener('click', add);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  btnClear.addEventListener('click', async () => {
    const doneIds = items.filter(x => x.done).map(x => x.id);
    const { error } = await db
      .from('shopping_items')
      .delete()
      .in('id', doneIds);
    if (error) {
      console.error(error);
      showToast('삭제 실패: ' + error.message);
      return;
    }
    items = items.filter(x => !x.done);
    render();
  });

  loadItems();
</script>
</body>
</html>
